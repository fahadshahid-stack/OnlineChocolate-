<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocolate Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    color:#333;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

section{
    background:white;
    margin:20px 0;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

h2{
    margin-bottom:15px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.product h3{
    margin:10px 0;
}

.price{
    color:#16a34a;
    font-size:20px;
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.auth-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:768px){
    .auth-grid{
        grid-template-columns:1fr;
    }
}

.hidden{
    display:none;
}

.order-card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:10px;
}

.status{
    margin-top:10px;
    font-weight:bold;
    color:#2563eb;
}

.user-box{
    background:#e0f2fe;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>
<body>

<header>
    <h1>🍫 Chocolate Store</h1>
    <p>Browse Products • Login • Place Orders</p>

    <div id="userInfo" class="user-box hidden">
        Logged in as:
        <span id="userEmail"></span>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">

<!-- PRODUCTS -->
<section>
    <h2>Products</h2>

    <div class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600" alt="">
            <h3>iPhone 15</h3>
            <p class="price">$999</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600" alt="">
            <h3>Smart Watch</h3>
            <p class="price">$299</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" alt="">
            <h3>Headphones</h3>
            <p class="price">$199</p>
        </div>

    </div>
</section>

<!-- AUTH -->
<section>
    <h2>Account</h2>

    <div class="auth-grid">

        <div>
            <h3>Sign Up</h3>

            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">

            <button onclick="signup()">Create Account</button>
        </div>

        <div>
            <h3>Login</h3>

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <button onclick="login()">Login</button>
        </div>

    </div>

    <div class="status" id="authStatus"></div>

</section>

<!-- ORDER FORM -->
<section>
    <h2>Place Order</h2>

    <p>You must be logged in before ordering.</p>

    <form id="orderForm">

        <input type="text" id="customerName" placeholder="Customer Name" required>

        <select id="productName" required>
            <option value="">Select Product</option>
            <option value="iPhone 15">iPhone 15</option>
            <option value="Smart Watch">Smart Watch</option>
            <option value="Headphones">Headphones</option>
        </select>

        <input type="number" id="quantity" value="1" min="1">

        <input type="number" id="price" placeholder="Price">

        <textarea id="message" placeholder="Message"></textarea>

        <button type="submit">Place Order</button>

    </form>

    <div class="status" id="orderStatus"></div>

</section>

<!-- HISTORY -->
<section>
    <h2>My Order History</h2>

    <div id="orderHistory">
        Login to view your orders.
    </div>
</section>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
getDocs,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =====================================
   REPLACE WITH YOUR FIREBASE CONFIG
===================================== */

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDiljGme3XAlQm4OiEcvnkiOViRxBlFDdQ",
  authDomain: "onlinestore-71df8.firebaseapp.com",
  projectId: "onlinestore-71df8",
  storageBucket: "onlinestore-71df8.firebasestorage.app",
  messagingSenderId: "343347991088",
  appId: "1:343347991088:web:40aa340696a3f5dfe613f5",
  measurementId: "G-NCZJRSCT1T"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ==========================
   SIGNUP
========================== */

window.signup = async function(){

try{

const email =
document.getElementById("signupEmail").value;

const password =
document.getElementById("signupPassword").value;

await createUserWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("authStatus").innerHTML =
"Account created successfully.";

}catch(error){

document.getElementById("authStatus").innerHTML =
error.message;

}

};

/* ==========================
   LOGIN
========================== */

window.login = async function(){

try{

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("authStatus").innerHTML =
"Login successful.";

}catch(error){

document.getElementById("authStatus").innerHTML =
error.message;

}

};

/* ==========================
   LOGOUT
========================== */

window.logout = async function(){

await signOut(auth);

};

/* ==========================
   AUTH STATE
========================== */

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser = user;

document.getElementById("userInfo")
.classList.remove("hidden");

document.getElementById("userEmail")
.innerText = user.email;

loadOrders();

}else{

currentUser = null;

document.getElementById("userInfo")
.classList.add("hidden");

document.getElementById("orderHistory")
.innerHTML = "Login to view your orders.";

}

});

/* ==========================
   PLACE ORDER
========================== */

document
.getElementById("orderForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

if(!currentUser){

document.getElementById("orderStatus")
.innerHTML =
"Please login first.";

return;

}

try{

const customerName =
document.getElementById("customerName").value;

const productName =
document.getElementById("productName").value;

const quantity =
Number(document.getElementById("quantity").value);

const price =
Number(document.getElementById("price").value);

const message =
document.getElementById("message").value;

await addDoc(
collection(db,"orders"),
{
userId: currentUser.uid,
userEmail: currentUser.email,
customerName,
productName,
quantity,
price,
message,
orderDate: new Date()
}
);

document.getElementById("orderStatus")
.innerHTML =
"Order saved successfully.";

document.getElementById("orderForm").reset();

loadOrders();

}catch(error){

document.getElementById("orderStatus")
.innerHTML =
error.message;

}

});

/* ==========================
   LOAD USER ORDERS
========================== */

async function loadOrders(){

if(!currentUser) return;

const container =
document.getElementById("orderHistory");

container.innerHTML = "Loading...";

const q = query(
collection(db,"orders"),
where("userId","==",currentUser.uid)
);

const snapshot = await getDocs(q);

container.innerHTML = "";

if(snapshot.empty){

container.innerHTML =
"No orders found.";

return;

}

snapshot.forEach(doc=>{

const order = doc.data();

container.innerHTML += `
<div class="order-card">
<b>Customer:</b> ${order.customerName}<br>
<b>Product:</b> ${order.productName}<br>
<b>Quantity:</b> ${order.quantity}<br>
<b>Price:</b> $${order.price}<br>
<b>Email:</b> ${order.userEmail}<br>
<b>Message:</b> ${order.message}<br>
<b>Date:</b>
${new Date(order.orderDate.seconds * 1000).toLocaleString()}
</div>
`;

});

}

</script>

</body>
</html>
