<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Firebase Store</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6f8}
header{background:#2563eb;color:#fff;padding:16px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.card{background:#fff;padding:16px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
button{background:#2563eb;color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
input,textarea{width:100%;padding:10px;margin:6px 0}
#cartItems div,#history div{border-bottom:1px solid #ddd;padding:8px 0}
</style>
</head>
<body>
<header><h1>Professional Firebase Store</h1></header>
<div class="container">

<div class="card">
<h2>Authentication</h2>
<input id="suEmail" placeholder="Signup Email">
<input id="suPass" type="password" placeholder="Signup Password">
<button onclick="signup()">Sign Up</button>
<br><br>
<input id="liEmail" placeholder="Login Email">
<input id="liPass" type="password" placeholder="Login Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="userInfo">Not logged in</p>
</div>

<h2>Products</h2>
<div class="grid" id="products"></div>

<div class="card">
<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="checkout()">Proceed to Checkout</button>
</div>

<div class="card">
<h2>My Order History</h2>
<div id="history"></div>
</div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {getFirestore,collection,addDoc,getDocs,query,where} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDiljGme3XAlQm4OiEcvnkiOViRxBlFDdQ",
  authDomain: "onlinestore-71df8.firebaseapp.com",
  projectId: "onlinestore-71df8",
  storageBucket: "onlinestore-71df8.firebasestorage.app",
  messagingSenderId: "343347991088",
  appId: "1:343347991088:web:40aa340696a3f5dfe613f5",
  measurementId: "G-NCZJRSCT1T"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

window.cart=[];
let currentUser=null;

const products=[
{name:"Laptop",price:799},
{name:"Smart Watch",price:199},
{name:"Headphones",price:99}
];

function renderProducts(){
 document.getElementById("products").innerHTML=products.map((p,i)=>`
 <div class="card">
 <h3>${p.name}</h3>
 <p>$${p.price}</p>
 <button onclick="addToCart(${i})">Add To Cart</button>
 </div>`).join("");
}

window.addToCart=(i)=>{
 const p=products[i];
 const ex=cart.find(x=>x.name===p.name);
 if(ex) ex.qty++;
 else cart.push({...p,qty:1});
 renderCart();
}

function renderCart(){
 let total=0;
 document.getElementById("cartItems").innerHTML=cart.map((c,i)=>{
 total+=c.price*c.qty;
 return `<div>${c.name} - $${c.price} x ${c.qty}
 <button onclick="changeQty(${i},1)">+</button>
 <button onclick="changeQty(${i},-1)">-</button></div>`;
 }).join("");
 document.getElementById("total").innerText=total;
}

window.changeQty=(i,d)=>{
 cart[i].qty+=d;
 if(cart[i].qty<=0) cart.splice(i,1);
 renderCart();
}

window.signup=()=>createUserWithEmailAndPassword(auth,suEmail.value,suPass.value);
window.login=()=>signInWithEmailAndPassword(auth,liEmail.value,liPass.value);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,async u=>{
 currentUser=u;
 userInfo.innerText=u?u.email:"Not logged in";
 if(u) loadHistory();
});

async function loadHistory(){
 const q=query(collection(db,"orders"),where("userId","==",currentUser.uid));
 const snap=await getDocs(q);
 history.innerHTML="";
 snap.forEach(d=>{
  const o=d.data();
  history.innerHTML+=`<div>${o.customerName} | ${o.total} USD | ${new Date(o.orderDate).toLocaleString()}</div>`;
 });
}

window.checkout=async()=>{
 if(!currentUser){alert("Login first");return;}
 if(cart.length===0){alert("Cart empty");return;}

 const customerName=prompt("Customer Name:");
 const customerEmail=prompt("Customer Email:");
 const total=cart.reduce((a,b)=>a+b.price*b.qty,0);

 await addDoc(collection(db,"orders"),{
  userId:currentUser.uid,
  userEmail:currentUser.email,
  customerName,
  customerEmail,
  items:cart,
  total,
  orderDate:new Date().toISOString()
 });


 emailjs.send("service_goyuwhs","template_2zb8s4c",{
   to_email:"fahad.shahid@yphs.tp.edu.tw",
   customer_name:customerName,
   customer_email:customerEmail,
   order_details:JSON.stringify(cart),
   total:total
 });
 

 alert("Thank you! Your order has been submitted successfully.");
 cart=[];
 renderCart();
 loadHistory();
}

renderProducts();
</script>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init("lXfoRnDqTitTuJFig");
</script>
</body>
</html>
